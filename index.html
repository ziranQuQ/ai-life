<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI人生模拟器</title>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>AI人生模拟器</h1>
      <p class="intro">输入你的姓名，开始一段人生剧情。</p>

      <form id="startForm" class="form">
        <label for="playerName">姓名</label>
        <input id="playerName" name="playerName" type="text" placeholder="例如：小明" autocomplete="name">
        <button type="submit">开始</button>
      </form>
    </section>
  </main>

  <script src="script.js?v=12"></script>
</body>
</html>
